{% extends "base.html" %} {% block content %}
<div class="min-h-screen bg-slate-900 text-white flex flex-col p-8">
  <!-- Cabeçalho -->
  <div class="border-b-4 border-amber-500 pb-6 mb-12">
    <h1
      class="text-6xl font-black uppercase italic tracking-tighter text-center"
    >
      {{ nome_prato }}
    </h1>
  </div>

  <!-- Container de Quantitativos -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-12 flex-1">
    <!-- Bloco: Em Produção -->
    <div
      class="bg-slate-800 rounded-[3rem] p-12 flex flex-col items-center justify-center border-b-8 border-amber-500 shadow-2xl"
    >
      <h2
        class="text-3xl font-bold uppercase tracking-widest text-slate-400 mb-4"
      >
        Em Produção
      </h2>
      <div class="text-[12rem] font-black leading-none text-amber-500">
        {{ qtd_producao }}
      </div>
      <p class="text-xl text-slate-500 mt-4 uppercase font-black">
        Unidades na Fila
      </p>
    </div>

    <!-- Bloco: Em Estoque -->
    <div
      class="bg-slate-800 rounded-[3rem] p-12 flex flex-col items-center justify-center border-b-8 border-blue-500 shadow-2xl"
    >
      <h2
        class="text-3xl font-bold uppercase tracking-widest text-slate-400 mb-4"
      >
        Disponível
      </h2>
      <div class="text-[12rem] font-black leading-none text-blue-500">
        {{ qtd_estoque }}
      </div>
      <p class="text-xl text-slate-500 mt-4 uppercase font-black">Em Estoque</p>
    </div>
  </div>

  <!-- Rodapé Informativo -->
  <div class="mt-12 text-center">
    <p
      class="text-slate-600 font-bold uppercase tracking-[0.5em] text-sm animate-pulse"
    >
      Atualização automática em tempo real
    </p>
  </div>
</div>

<script>
  // Atualiza a página a cada 5 segundos para manter os números frescos
  setTimeout(() => {
    location.reload();
  }, 5000);
</script>

<style>
  /* Oculta elementos desnecessários para modo TV/Monitor */
  nav,
  footer,
  header {
    display: none !important;
  }
  body {
    background-color: #0f172a;
    overflow: hidden;
  }
</style>
{% endblock %}
