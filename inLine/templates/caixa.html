{% extends "base.html" %} {% load static %} {% block content %}
<div id="config" data-csrf="{{ csrf_token }}" class="hidden"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<div class="flex h-[calc(100vh-64px)] overflow-hidden bg-slate-100">
  <div class="flex-1 p-6 overflow-y-auto custom-scrollbar">
    <div
      id="tma-container"
      class="flex gap-4 mb-8 overflow-x-auto pb-2 custom-scrollbar"
    ></div>

    <div class="flex justify-between items-center mb-8">
      <div class="flex items-center gap-4">
        <a
          href="{% url 'dashboard-central' %}"
          class="bg-white text-slate-400 p-3 rounded-2xl hover:text-blue-600 shadow-sm border border-slate-200 transition-all group"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
            />
          </svg>
        </a>
        <h1
          class="text-3xl font-black text-slate-800 tracking-tighter italic uppercase"
        >
          Novo Pedido
        </h1>
      </div>

      <div class="flex gap-2">
        <button
          onclick="toggleModoEdicao()"
          id="btn-modo-edicao"
          class="bg-white border border-slate-200 text-slate-600 px-6 py-3 rounded-2xl text-xs font-black shadow-sm hover:bg-slate-50 transition-all uppercase tracking-widest"
        >
          Editar Cardápio
        </button>
        <a
          href="/cadastrar-prato/"
          class="bg-blue-600 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all uppercase tracking-widest"
        >
          + Novo Prato
        </a>
      </div>
    </div>

    <div
      id="grid-produtos"
      class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
    ></div>
  </div>

  <div class="w-96 bg-white shadow-2xl flex flex-col border-l border-slate-200">
    <div
      id="lista-carrinho"
      class="flex-1 overflow-y-auto p-6 space-y-3 custom-scrollbar"
    >
      <p
        id="carrinho-vazio"
        class="text-slate-300 text-center mt-20 font-bold uppercase text-xs tracking-widest"
      >
        Carrinho vazio
      </p>
    </div>
    <div class="p-6 bg-slate-50 border-t border-slate-100 space-y-4">
      <div
        id="total-pedido"
        class="text-blue-600 text-4xl font-black tracking-tighter text-right"
      >
        R$ 0,00
      </div>
      <button
        onclick="finalizarPedido('NORMAL')"
        class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all"
      >
        Pedido Comum
      </button>
      <button
        onclick="finalizarPedido('PREFERENCIAL')"
        class="w-full bg-amber-400 text-amber-950 py-4 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-all"
      >
        Prioridade
      </button>
    </div>
  </div>
</div>

<div
  id="modal-edicao"
  class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4"
>
  <div class="bg-white rounded-[2.5rem] w-full max-w-md p-8 shadow-2xl">
    <h2
      class="text-2xl font-black text-slate-800 uppercase tracking-tighter mb-6"
    >
      Editar Prato
    </h2>
    <input type="hidden" id="edit-id" />
    <div class="space-y-4">
      <div>
        <label
          class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2"
          >Nome do Prato</label
        >
        <input
          type="text"
          id="edit-nome"
          class="w-full bg-slate-50 border-none rounded-2xl p-4 font-bold text-slate-800 focus:ring-2 focus:ring-blue-500"
        />
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label
            class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2"
            >Preço (R$)</label
          >
          <input
            type="number"
            step="0.01"
            id="edit-preco"
            class="w-full bg-slate-50 border-none rounded-2xl p-4 font-bold text-slate-800 focus:ring-2 focus:ring-blue-500"
          />
        </div>
        <div>
          <label
            class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2"
            >Estoque</label
          >
          <input
            type="number"
            id="edit-estoque"
            class="w-full bg-slate-50 border-none rounded-2xl p-4 font-bold text-slate-800 focus:ring-2 focus:ring-blue-500"
          />
        </div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-3 mt-8">
      <button
        onclick="fecharModal()"
        class="py-4 rounded-2xl font-black text-xs uppercase tracking-widest text-slate-400"
      >
        Cancelar
      </button>
      <button
        onclick="salvarEdicao()"
        class="bg-blue-600 text-white py-4 rounded-2xl font-black text-xs uppercase tracking-widest"
      >
        Salvar
      </button>
    </div>
  </div>
</div>

<div
  id="cupom-impressao"
  class="hidden print:block text-black p-4 font-mono text-sm w-[80mm] mx-auto bg-white"
>
  <div class="text-center border-b border-dashed border-black pb-2 mb-2">
    <h2 class="font-black text-lg uppercase">Meu Restaurante</h2>
    <p>Data: <span id="print-data"></span></p>
    <p>Tipo: <span id="print-tipo"></span></p>
  </div>
  <div class="text-center my-4">
    <h1 id="print-senha" class="text-5xl font-black">0000</h1>
    <p class="text-xs uppercase font-bold">Senha do Pedido</p>
  </div>
  <table class="w-full text-left mb-4 border-b border-dashed border-black pb-2">
    <thead>
      <tr>
        <th class="pb-1 text-xs">Item</th>
        <th class="text-right pb-1 text-xs">Subtotal</th>
      </tr>
    </thead>
    <tbody id="print-itens-corpo" class="text-xs"></tbody>
  </table>
  <div class="flex justify-between font-black text-lg mb-4">
    <span>TOTAL:</span><span id="print-total">R$ 0,00</span>
  </div>
  <div class="flex flex-col items-center gap-2">
    <div id="qrcode-canvas" class="flex justify-center bg-white p-1"></div>
    <p class="text-[10px] text-center uppercase font-bold">
      Acompanhe pelo QR Code
    </p>
  </div>
</div>

<script src="{% static 'js/caixa.js' %}"></script>

<style>
  .custom-scrollbar::-webkit-scrollbar {
    width: 4px;
    height: 4px;
  }
  .custom-scrollbar::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 10px;
  }
  @media print {
    body * {
      visibility: hidden;
    }
    #cupom-impressao,
    #cupom-impressao * {
      visibility: visible;
    }
    #cupom-impressao {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
    }
  }
</style>
{% endblock %}
